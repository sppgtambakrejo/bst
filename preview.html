<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pratinjau — Surat Jalan MBG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
:root {
  --ink: #1a2233;
  --paper: #ffffff;
  --muted: #6b7280;
  --line: #d7dbe2;
  --accent: #0f2f5f;
  --accent-soft: #eef2f8;
  --danger: #b3261e;
  font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; background: #f3f4f7; color: var(--ink); }
.hint { color: var(--muted); font-size: 0.85rem; }
.preview-banner {
  background: #fff3cd; color: #7a5c00; border-bottom: 1px solid #e5d28a;
  padding: 0.5rem 1rem; font-size: 0.82rem; text-align: center;
}
.app-shell { max-width: 900px; margin: 0 auto; padding: 1rem 1rem 3rem; }
.app-header { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 0; }
.app-logo { width: 48px; height: 48px; object-fit: contain; }
.app-header h1 { margin: 0; font-size: 1.3rem; color: var(--accent); }
.tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; border-bottom: 2px solid var(--line); margin-bottom: 1.2rem; }
.tabs button { background: none; border: none; padding: 0.6rem 0.9rem; font-size: 0.9rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.card { background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 1.2rem 1.4rem; margin-bottom: 1.2rem; }
.card-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 0.6rem; }
.card h2 { margin: 0 0 0.4rem; font-size: 1.1rem; color: var(--accent); }
.card h3 { font-size: 0.95rem; margin: 1rem 0 0.3rem; }
.field { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 0.7rem; font-size: 0.85rem; font-weight: 600; color: #33415c; }
.field input, .field select { font-weight: 400; padding: 0.5rem 0.6rem; border: 1px solid var(--line); border-radius: 6px; font-size: 0.95rem; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0 1rem; }
button { font-family: inherit; }
.btn-primary, .btn-secondary, .btn-plain, .btn-icon { cursor: pointer; border-radius: 6px; padding: 0.5rem 0.9rem; font-size: 0.88rem; border: 1px solid transparent; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-secondary { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); }
.btn-plain { background: none; color: var(--muted); }
.btn-icon { background: none; color: var(--danger); padding: 0.3rem 0.5rem; }
.btn-icon.danger { color: var(--danger); }
.actions { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; }
hr { border: none; border-top: 1px solid var(--line); margin: 1.4rem 0; }
.kelas-editor-head, .kelas-editor-row { display: grid; grid-template-columns: 2fr 1fr 2.2rem; gap: 0.5rem; align-items: center; margin-bottom: 0.4rem; }
.kelas-editor-head { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
.kelas-editor-row input { padding: 0.4rem 0.5rem; border: 1px solid var(--line); border-radius: 6px; width: 100%; }
.school-list { display: flex; flex-direction: column; gap: 0.6rem; }
.school-item { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; padding: 0.7rem 0.9rem; border: 1px solid var(--line); border-radius: 8px; }
.school-item-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.rows-editor { overflow-x: auto; }
.rows-editor-head, .rows-editor-row { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr 1.6fr 2rem; gap: 0.4rem; align-items: center; margin-bottom: 0.35rem; min-width: 620px; }
.rows-editor-head { font-size: 0.78rem; color: var(--muted); font-weight: 600; }
.rows-editor-row input { padding: 0.35rem 0.45rem; border: 1px solid var(--line); border-radius: 6px; width: 100%; font-size: 0.88rem; }
.total-line { margin-top: 0.8rem; font-size: 0.95rem; }
.filter-tanggal { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--muted); }
.filter-tanggal input { padding: 0.35rem 0.5rem; border: 1px solid var(--line); border-radius: 6px; }
.list-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--line); }
.checkbox-line { display: flex; align-items: center; gap: 0.45rem; font-size: 0.9rem; }
.doc-list { display: flex; flex-direction: column; gap: 0.5rem; }
.doc-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.8rem; border: 1px solid var(--line); border-radius: 8px; flex-wrap: wrap; }
.doc-item-info { flex: 1; min-width: 200px; }
.doc-item-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.print-wrapper { max-width: 900px; margin: 0 auto; padding: 1rem; }
.print-toolbar { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1.2rem; }
.print-page { background: white; border: 1px solid var(--line); padding: 10mm 14.5mm 27.5mm 23mm; margin: 0 auto 2rem; width: 210mm; min-height: 297mm; font-size: 12.5px; color: #000; }
.print-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
.print-logo { width: 100px; height: 40.4px; object-fit: contain; flex-shrink: 0; }
.print-header-text { text-align: center; flex: 1; }
.print-title { font-weight: 700; font-size: 14px; font-family: 'Times New Roman', Times, serif; }
.print-meta-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-family: 'Times New Roman', Times, serif; font-size: 12px; }
.print-meta-table td { padding: 1px 6px 1px 0; vertical-align: top; }
.meta-label { white-space: nowrap; }
.print-main-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; font-family: 'Times New Roman', Times, serif; table-layout: fixed; }
.print-main-table th, .print-main-table td { border: 1px solid #000; padding: 3px 4px; font-size: 12px; text-align: center; word-wrap: break-word; }
.print-main-table th { font-weight: 700; }
.total-label { font-weight: 700; }
.total-value { font-weight: 700; }
.print-signature-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-family: 'Times New Roman', Times, serif; font-size: 12px; }
.print-signature-table td { padding: 1px 4px; text-align: center; vertical-align: top; }
.sig-space-row td { height: 60px; }
.sig-name { font-weight: 700; }
.tim-distribusi-wrap { display: flex; justify-content: flex-end; margin-top: 24px; }
.print-tim-distribusi { width: 28%; border-collapse: collapse; font-family: 'Times New Roman', Times, serif; font-size: 12px; }
.print-tim-distribusi td { padding: 1px 4px; }
.print-tim-distribusi .sig-space-row td { height: 30px; }
.sig-name-center { text-align: center; font-weight: 700; }
@media print {
  body { background: white; }
  .no-print { display: none !important; }
  .print-wrapper { max-width: none; padding: 0; }
  .print-page { border: none; margin: 0; width: auto; min-height: auto; page-break-after: always; }
  .print-page:last-child { page-break-after: auto; }
  @page { size: A4; margin: 10mm 14.5mm 27.5mm 23mm; }
}
</style>
</head>

// ---------- db.js (versi inline untuk pratinjau) ----------

const KEYS = { SPPG: 'mbg_sppg_info_preview', SCHOOLS: 'mbg_schools_preview', SURAT_JALAN: 'mbg_surat_jalan_preview' };

function read(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch (e) { return fallback; }
}
function write(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

const DEFAULT_SPPG = {
  namaSppg: 'SPPG KABUPATEN SLEMAN TEMPEL TAMBAKREJO',
  alamat: 'Jl. Tempel-Seyegan, Tambakrejo, Tempel, Sleman',
  ahliGizi: 'Dewi Nugraha Primastuti, S.Gz.',
  koordinatorLapangan: 'M. Syamsul Hadi',
};

const db = {
  getSppgInfo: () => read(KEYS.SPPG, DEFAULT_SPPG),
  saveSppgInfo: (info) => write(KEYS.SPPG, info),
  getSchools: () => read(KEYS.SCHOOLS, []),
  saveSchools: (schools) => write(KEYS.SCHOOLS, schools),
  upsertSchool: (school) => {
    const schools = db.getSchools();
    const idx = schools.findIndex((s) => s.id === school.id);
    if (idx >= 0) schools[idx] = school; else schools.push(school);
    db.saveSchools(schools);
    return schools;
  },
  deleteSchool: (id) => { const s = db.getSchools().filter((x) => x.id !== id); db.saveSchools(s); return s; },
  getSuratJalanList: () => read(KEYS.SURAT_JALAN, []),
  saveSuratJalanList: (list) => write(KEYS.SURAT_JALAN, list),
  upsertSuratJalan: (doc) => {
    const list = db.getSuratJalanList();
    const idx = list.findIndex((d) => d.id === doc.id);
    if (idx >= 0) list[idx] = doc; else list.unshift(doc);
    db.saveSuratJalanList(list);
    return list;
  },
  deleteSuratJalan: (id) => { const l = db.getSuratJalanList().filter((x) => x.id !== id); db.saveSuratJalanList(l); return l; },
  exportAllData: () => ({ sppg: db.getSppgInfo(), schools: db.getSchools(), suratJalan: db.getSuratJalanList(), exportedAt: new Date().toISOString() }),
  importAllData: (data) => {
    if (data.sppg) db.saveSppgInfo(data.sppg);
    if (data.schools) db.saveSchools(data.schools);
    if (data.suratJalan) db.saveSuratJalanList(data.suratJalan);
  },
};

// ---------- utils.js ----------

function todayISO() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}
function hariIndonesia(isoDate) {
  if (!isoDate) return '';
  const d = new Date(isoDate + 'T00:00:00');
  return new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(d);
}
function tanggalIndonesia(isoDate) {
  if (!isoDate) return '';
  const d = new Date(isoDate + 'T00:00:00');
  return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
}
function sumPorsi(rows) { return rows.reduce((t, r) => t + (Number(r.jumlahPorsi) || 0), 0); }

function emptyKelas() { return { id: uid(), nama: '', defaultPorsi: '' }; }
function emptySchool() { return { id: uid(), nama: '', kelasList: [emptyKelas()] }; }

function SchoolManager({ schools, onSave, onDelete }) {
  const [editing, setEditing] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  function startNew() { setEditing(emptySchool()); }
  function startEdit(school) { setEditing(JSON.parse(JSON.stringify(school))); }
  function cancelEdit() { setEditing(null); }
  function updateField(field, value) { setEditing((p) => ({ ...p, [field]: value })); }
  function updateKelas(idx, field, value) {
    setEditing((p) => { const k = [...p.kelasList]; k[idx] = { ...k[idx], [field]: value }; return { ...p, kelasList: k }; });
  }
  function addKelas() { setEditing((p) => ({ ...p, kelasList: [...p.kelasList, emptyKelas()] })); }
  function removeKelas(idx) { setEditing((p) => ({ ...p, kelasList: p.kelasList.filter((_, i) => i !== idx) })); }

  function handleSave() {
    if (!editing.nama.trim()) { alert('Nama sekolah wajib diisi.'); return; }
    const cleaned = { ...editing, kelasList: editing.kelasList.filter((k) => k.nama.trim()).map((k) => ({ ...k, defaultPorsi: Number(k.defaultPorsi) || 0 })) };
    onSave(cleaned);
    setEditing(null);
  }

  if (editing) {
    return (
      <div className="card">
        <h2>{editing.nama ? 'Ubah Sekolah' : 'Tambah Sekolah'}</h2>
        <label className="field">
          <span>Nama Sekolah</span>
          <input type="text" value={editing.nama} onChange={(e) => updateField('nama', e.target.value)} placeholder="Contoh: SMA NEGERI 1 TEMPEL" />
        </label>
        <h3>Daftar Kelas &amp; Porsi Default</h3>
        <p className="hint">Ini jadi template harian. Saat membuat surat jalan baru untuk sekolah ini, daftar kelas dan jumlah porsi akan otomatis terisi dari sini.</p>
        <div>
          <div className="kelas-editor-head"><span>Nama Kelas</span><span>Porsi Default</span><span></span></div>
          {editing.kelasList.map((k, idx) => (
            <div className="kelas-editor-row" key={k.id}>
              <input type="text" value={k.nama} onChange={(e) => updateKelas(idx, 'nama', e.target.value)} placeholder="Contoh: X A" />
              <input type="number" min="0" value={k.defaultPorsi} onChange={(e) => updateKelas(idx, 'defaultPorsi', e.target.value)} placeholder="0" />
              <button type="button" className="btn-icon danger" onClick={() => removeKelas(idx)} title="Hapus baris">✕</button>
            </div>
          ))}
        </div>
        <button type="button" className="btn-secondary" onClick={addKelas}>+ Tambah Kelas</button>
        <div className="actions">
          <button type="button" className="btn-primary" onClick={handleSave}>Simpan Sekolah</button>
          <button type="button" className="btn-plain" onClick={cancelEdit}>Batal</button>
        </div>
      </div>
    );
  }

  return (
    <div className="card">
      <div className="card-head">
        <h2>Data Sekolah</h2>
        <button type="button" className="btn-primary" onClick={startNew}>+ Tambah Sekolah</button>
      </div>
      {schools.length === 0 && <p className="hint">Belum ada sekolah. Tambahkan sekolah pertama untuk mulai membuat surat jalan.</p>}
      <div className="school-list">
        {schools.map((s) => (
          <div className="school-item" key={s.id}>
            <div><strong>{s.nama}</strong><div className="hint">{s.kelasList.length} kelas terdaftar</div></div>
            <div className="school-item-actions">
              <button type="button" className="btn-secondary" onClick={() => startEdit(s)}>Ubah</button>
              {confirmDeleteId === s.id ? (
                <>
                  <button type="button" className="btn-icon danger" onClick={() => { onDelete(s.id); setConfirmDeleteId(null); }}>Yakin, Hapus</button>
                  <button type="button" className="btn-plain" onClick={() => setConfirmDeleteId(null)}>Batal</button>
                </>
              ) : (
                <button type="button" className="btn-plain" onClick={() => setConfirmDeleteId(s.id)}>Hapus</button>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function buildRowsFromSchool(school) {

function SuratJalanForm({ schools, editingDoc, onSaved, onCancelEdit }) {
  const [sekolahId, setSekolahId] = useState('');

  const [driver, setDriver] = useState('');

  useEffect(() => {
    if (editingDoc) {
      setSekolahId(editingDoc.sekolahId);
      setTanggal(editingDoc.tanggal);
      setWaktuPengiriman(editingDoc.waktuPengiriman || '');
      setDriver(editingDoc.driver || '');
      setRows(editingDoc.rows);
    }
  }, [editingDoc]);

  function handlePilihSekolah(id) {
    setSekolahId(id);
    if (!editingDoc || editingDoc.sekolahId !== id) {
      const school = schools.find((s) => s.id === id);
      if (school) setRows(buildRowsFromSchool(school));
    }
  }
  function updateRow(idx, field, value) { setRows((p) => { const n = [...p]; n[idx] = { ...n[idx], [field]: value }; return n; }); }
  function addRow() { setRows((p) => [...p, { id: uid(), kelas: '', jumlahPorsi: 0, alatSebelum: '', alatSesudah: '', keterangan: '' }]); }
  function removeRow(idx) { setRows((p) => p.filter((_, i) => i !== idx)); }
  function resetForm() { setSekolahId(''); setTanggal(todayISO()); setWaktuPengiriman(''); setDriver(''); setRows([]); }

  function handleSubmit(e) {
    e.preventDefault();
    if (!sekolahId) { alert('Pilih sekolah tujuan dulu.'); return; }
    if (rows.length === 0) { alert('Tambahkan minimal satu baris kelas.'); return; }
    const doc = { id: editingDoc ? editingDoc.id : uid(), sekolahId, tanggal, waktuPengiriman, driver, rows, createdAt: editingDoc ? editingDoc.createdAt : new Date().toISOString() };
    onSaved(doc);
    if (!editingDoc) resetForm();
  }

  const total = sumPorsi(rows);
  const selectedSchool = schools.find((s) => s.id === sekolahId);

  return (
    <form className="card" onSubmit={handleSubmit}>
      <div className="card-head">
        <h2>{editingDoc ? 'Ubah Surat Jalan' : 'Buat Surat Jalan Baru'}</h2>
        {editingDoc && <button type="button" className="btn-plain" onClick={onCancelEdit}>Batal ubah</button>}
      </div>
      {schools.length === 0 ? (
        <p className="hint">Belum ada data sekolah. Tambahkan sekolah dulu di tab "Data Sekolah".</p>
      ) : (
        <>
          <div className="form-grid">
            <label className="field">
              <span>Sekolah Tujuan</span>
              <select value={sekolahId} onChange={(e) => handlePilihSekolah(e.target.value)}>
                <option value="">— Pilih Sekolah —</option>
                {schools.map((s) => <option key={s.id} value={s.id}>{s.nama}</option>)}
              </select>
            </label>
            <label className="field">
              <span>Tanggal</span>
              <input type="date" value={tanggal} onChange={(e) => setTanggal(e.target.value)} />
              <span className="hint">Hari: {hariIndonesia(tanggal) || '-'}</span>
            </label>
            <label className="field">
              <span>Waktu Pengiriman</span>
              <input type="time" value={waktuPengiriman} onChange={(e) => setWaktuPengiriman(e.target.value)} />
            </label>
            <label className="field">
              <span>Driver</span>
              <input type="text" value={driver} onChange={(e) => setDriver(e.target.value)} placeholder="Nama driver" />
            </label>
          </div>
          {selectedSchool && (
            <>
              <h3>Daftar Kelas &amp; Porsi</h3>
              <div className="rows-editor">
                <div className="rows-editor-head"><span>Kelas</span><span>Jumlah Porsi</span><span>Alat Sebelum</span><span>Alat Sesudah</span><span>Keterangan</span><span></span></div>
                {rows.map((r, idx) => (
                  <div className="rows-editor-row" key={r.id}>
                    <input type="text" value={r.kelas} onChange={(e) => updateRow(idx, 'kelas', e.target.value)} />
                    <input type="number" min="0" value={r.jumlahPorsi} onChange={(e) => updateRow(idx, 'jumlahPorsi', e.target.value)} />
                    <input type="text" value={r.alatSebelum} onChange={(e) => updateRow(idx, 'alatSebelum', e.target.value)} />
                    <input type="text" value={r.alatSesudah} onChange={(e) => updateRow(idx, 'alatSesudah', e.target.value)} />
                    <input type="text" value={r.keterangan} onChange={(e) => updateRow(idx, 'keterangan', e.target.value)} />

                  </div>
                ))}
              </div>
              <button type="button" className="btn-secondary" onClick={addRow}>+ Tambah Baris</button>
              <div className="total-line">Total Porsi: <strong>{total}</strong></div>
            </>
          )}
          <div className="actions">
            <button type="submit" className="btn-primary">{editingDoc ? 'Simpan Perubahan' : 'Simpan Surat Jalan'}</button>
          </div>
        </>
      )}
    </form>
  );
}

function SuratJalanList({ docs, schools, onEdit, onDelete, onPrint }) {
  const [selected, setSelected] = useState(() => new Set());
  const [filterTanggal, setFilterTanggal] = useState('');
  const schoolName = (id) => schools.find((s) => s.id === id)?.nama || '(sekolah tidak ditemukan)';
  const filtered = useMemo(() => {
    const list = filterTanggal ? docs.filter((d) => d.tanggal === filterTanggal) : docs;
    return [...list].sort((a, b) => (a.tanggal < b.tanggal ? 1 : -1));
  }, [docs, filterTanggal]);

  function toggle(id) { setSelected((p) => { const n = new Set(p); if (n.has(id)) n.delete(id); else n.add(id); return n; }); }
  function toggleAll() { setSelected((p) => (p.size === filtered.length ? new Set() : new Set(filtered.map((d) => d.id)))); }
  function handlePrintSelected() {
    if (selected.size === 0) { alert('Pilih minimal satu surat jalan untuk dicetak.'); return; }
    onPrint(filtered.filter((d) => selected.has(d.id)).map((d) => d.id));
  }

  return (
    <div className="card">
      <div className="card-head">
        <h2>Daftar Surat Jalan</h2>
        <label className="filter-tanggal">
          <span>Filter tanggal:</span>
          <input type="date" value={filterTanggal} onChange={(e) => setFilterTanggal(e.target.value)} />
          {filterTanggal && <button type="button" className="btn-plain" onClick={() => setFilterTanggal('')}>Bersihkan</button>}
        </label>
      </div>
      {filtered.length === 0 ? <p className="hint">Belum ada surat jalan yang dibuat.</p> : (
        <>
          <div className="list-toolbar">
            <label className="checkbox-line">
              <input type="checkbox" checked={selected.size > 0 && selected.size === filtered.length} onChange={toggleAll} />
              Pilih Semua ({selected.size}/{filtered.length})
            </label>
            <button type="button" className="btn-primary" onClick={handlePrintSelected}>🖨 Cetak yang Dipilih</button>
          </div>
          <div className="doc-list">
            {filtered.map((d) => (
              <div className="doc-item" key={d.id}>
                <input type="checkbox" checked={selected.has(d.id)} onChange={() => toggle(d.id)} />
                <div className="doc-item-info">
                  <strong>{schoolName(d.sekolahId)}</strong>
                  <div className="hint">{tanggalIndonesia(d.tanggal)}{d.waktuPengiriman ? ` · ${d.waktuPengiriman}` : ''}{d.driver ? ` · Driver: ${d.driver}` : ''} · Total porsi: {sumPorsi(d.rows)}</div>
                </div>
                <div className="doc-item-actions">
                  <button type="button" className="btn-secondary" onClick={() => onPrint([d.id])}>Cetak</button>
                  <button type="button" className="btn-secondary" onClick={() => onEdit(d)}>Ubah</button>
                  <button type="button" className="btn-plain" onClick={() => { if (confirm('Hapus surat jalan ini?')) onDelete(d.id); }}>Hapus</button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function SppgSettings({ sppg, onSave, onExport, onImport }) {
  const [form, setForm] = useState(sppg);
  const fileInputRef = useRef(null);
  useEffect(() => setForm(sppg), [sppg]);
  function update(field, value) { setForm((p) => ({ ...p, [field]: value })); }
  function handleSave(e) { e.preventDefault(); onSave(form); alert('Identitas SPPG tersimpan.'); }
  function handleImportFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try { onImport(JSON.parse(reader.result)); alert('Data berhasil dipulihkan dari file cadangan.'); }
      catch (err) { alert('File cadangan tidak valid.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
  return (
    <div className="card">
      <h2>Identitas SPPG</h2>
      <p className="hint">Data ini muncul di setiap surat jalan yang dicetak.</p>
      <form onSubmit={handleSave}>
        <label className="field"><span>Nama SPPG</span><input type="text" value={form.namaSppg} onChange={(e) => update('namaSppg', e.target.value)} /></label>
        <label className="field"><span>Alamat</span><input type="text" value={form.alamat} onChange={(e) => update('alamat', e.target.value)} /></label>
        <label className="field"><span>Nama Ahli Gizi (Diperiksa oleh)</span><input type="text" value={form.ahliGizi} onChange={(e) => update('ahliGizi', e.target.value)} /></label>
        <label className="field"><span>Nama Koordinator Lapangan (Diterima Oleh)</span><input type="text" value={form.koordinatorLapangan} onChange={(e) => update('koordinatorLapangan', e.target.value)} /></label>
        <div className="actions"><button type="submit" className="btn-primary">Simpan Identitas</button></div>
      </form>
      <hr />
      <h2>Cadangan Data</h2>
      <p className="hint">Semua data (sekolah &amp; surat jalan) disimpan langsung di browser perangkat ini, bukan di server. Unduh cadangan secara berkala.</p>
      <div className="actions">
        <button type="button" className="btn-secondary" onClick={onExport}>⬇ Unduh Cadangan (.json)</button>
        <button type="button" className="btn-secondary" onClick={() => fileInputRef.current?.click()}>⬆ Pulihkan dari File</button>
        <input ref={fileInputRef} type="file" accept="application/json" style={{ display: 'none' }} onChange={handleImportFile} />
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('buat');
  const [schools, setSchools] = useState([]);
  const [docs, setDocs] = useState([]);
  const [sppg, setSppg] = useState(db.getSppgInfo());
  const [editingDoc, setEditingDoc] = useState(null);
  const [printIds, setPrintIds] = useState(null);

  useEffect(() => {
    let existing = db.getSchools();
    if (existing.length === 0) { existing = [CONTOH_SEKOLAH]; db.saveSchools(existing); }
    setSchools(existing);
    setDocs(db.getSuratJalanList());
  }, []);

  function handleSaveSchool(school) { setSchools(db.upsertSchool(school)); }
  function handleDeleteSchool(id) { setSchools(db.deleteSchool(id)); }
  function handleSaveDoc(doc) { setDocs(db.upsertSuratJalan(doc)); setEditingDoc(null); setTab('daftar'); }
  function handleEditDoc(doc) { setEditingDoc(doc); setTab('buat'); }
  function handleDeleteDoc(id) { setDocs(db.deleteSuratJalan(id)); }
  function handleSaveSppg(info) { db.saveSppgInfo(info); setSppg(info); }
  function handleExport() {
    const data = db.exportAllData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `cadangan-surat-jalan-${data.exportedAt.slice(0, 10)}.json`; a.click();
    URL.revokeObjectURL(url);
  }
  function handleImport(data) { db.importAllData(data); setSchools(db.getSchools()); setDocs(db.getSuratJalanList()); setSppg(db.getSppgInfo()); }

  if (printIds) {
    const selectedDocs = printIds.map((id) => docs.find((d) => d.id === id)).filter(Boolean);
    return <PrintView docs={selectedDocs} schools={schools} sppg={sppg} onBack={() => setPrintIds(null)} />;
  }

  return (
    <div className="app-shell">
      <header className="app-header no-print">
        <img src={LOGO_SRC} alt="Logo" className="app-logo" />
        <div><h1>Surat Jalan MBG</h1><div className="hint">Program Makan Bergizi Gratis</div></div>
      </header>
      <nav className="tabs no-print">
        <button className={tab === 'buat' ? 'active' : ''} onClick={() => setTab('buat')}>Buat Surat Jalan</button>
        <button className={tab === 'daftar' ? 'active' : ''} onClick={() => setTab('daftar')}>Daftar Surat Jalan</button>
        <button className={tab === 'sekolah' ? 'active' : ''} onClick={() => setTab('sekolah')}>Data Sekolah</button>
        <button className={tab === 'pengaturan' ? 'active' : ''} onClick={() => setTab('pengaturan')}>Pengaturan</button>
      </nav>
      <main className="app-main no-print">
        {tab === 'buat' && <SuratJalanForm schools={schools} editingDoc={editingDoc} onSaved={handleSaveDoc} onCancelEdit={() => { setEditingDoc(null); setTab('daftar'); }} />}
        {tab === 'daftar' && <SuratJalanList docs={docs} schools={schools} onEdit={handleEditDoc} onDelete={handleDeleteDoc} onPrint={(ids) => setPrintIds(ids)} />}
        {tab === 'sekolah' && <SchoolManager schools={schools} onSave={handleSaveSchool} onDelete={handleDeleteSchool} />}
        {tab === 'pengaturan' && <SppgSettings sppg={sppg} onSave={handleSaveSppg} onExport={handleExport} onImport={handleImport} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
